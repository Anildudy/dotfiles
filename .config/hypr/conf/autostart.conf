# Start OSD server
exec-once = swayosd-server

# Start Listeners
exec-once=~/.config/dotfiles-settings/listeners.sh --startall

# Start Polkit
exec-once=/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Restore Wallpaper
exec-once = ~/.config/dotfiles-settings/scripts/dot-wallpaper-app --restore

# Autostart script
exec-once = ~/.config/dotfiles-settings/scripts/dot-autostart

# Load GTK settings
exec-once = ~/.config/hypr/scripts/gtk.sh

# Load Notification Daemon
exec-once = swaync

# Using hypridle to start hyprlock
exec-once = hypridle

# Load cliphist history
exec-once = wl-paste --watch cliphist store

# Start autostart cleanup
exec-once = ~/.config/hypr/scripts/cleanup.sh

# Load configuration from App Hyprland Settings App
exec = ~/.config/com.dotfiles.hyprlandsettings/hyprctl.sh
